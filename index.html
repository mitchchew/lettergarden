<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Letter Garden — Tracing</title>
<style>
  :root{
    --bg:#EFEAE3; --card:#FBF8F3;
    --ink:#3E6B89; --ink-soft:#9DB8CB;
    --guide:#DAD3C6; --guide-dark:#C4BBAA;
    --text:#4A443C; --text-soft:#8C8375;
    --honey:#E8A25E; --gold:#E9B44C; --leaf:#7C9A6D;
    --pop1:#E98B7A; --pop2:#7FA8C9; --pop3:#E9B44C; --pop4:#8FAF87;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{
    background:var(--bg);
    font-family:ui-rounded,'SF Pro Rounded','Hiragino Maru Gothic ProN','Quicksand','Nunito','Segoe UI',system-ui,sans-serif;
    color:var(--text); display:flex;flex-direction:column;
    user-select:none;-webkit-user-select:none; touch-action:manipulation;
  }
  header{display:flex;align-items:center;justify-content:space-between;padding:12px 18px 4px}
  .brand{font-size:14px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-soft);font-weight:600}
  .stars{display:flex;align-items:center;gap:6px;background:var(--card);border-radius:999px;
    padding:5px 13px;box-shadow:0 2px 8px rgba(74,68,60,.08);font-weight:700;font-size:17px}
  .stars .icon{color:var(--gold);font-size:19px;transform:translateY(-1px)}
  #soundBtn{border:none;background:var(--card);border-radius:999px;width:38px;height:38px;
    font-size:17px;cursor:pointer;box-shadow:0 2px 8px rgba(74,68,60,.08);color:var(--text)}

  /* mode tabs */
  #tabs{display:flex;gap:6px;justify-content:center;padding:6px 12px 2px}
  .tab{border:none;background:transparent;border-radius:999px;padding:7px 16px;cursor:pointer;
    font-family:inherit;font-size:15px;font-weight:700;color:var(--text-soft)}
  .tab.on{background:var(--card);color:var(--ink);box-shadow:0 2px 8px rgba(74,68,60,.10)}

  #prompt{text-align:center;font-size:clamp(17px,2.4vw,22px);font-weight:700;padding:2px 14px 0;min-height:28px}
  #prompt .wchar{display:inline-block;margin:0 2px;color:var(--guide-dark)}
  #prompt .wchar.doneChar{color:var(--leaf)}
  #prompt .wchar.nowChar{color:var(--ink);transform:scale(1.2)}
  #hint{text-align:center;font-size:13px;color:var(--text-soft);min-height:18px;padding:0 14px}

  #stage{flex:1;position:relative;margin:6px auto 2px;width:min(92vw,66vh)}
  #card{position:absolute;inset:0;background:var(--card);border-radius:26px;box-shadow:0 10px 30px rgba(74,68,60,.10)}
  canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;border-radius:26px}

  /* word builder */
  #builder{position:absolute;inset:0;border-radius:26px;background:var(--card);display:none;
    flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:14px;z-index:5}
  #builder.show{display:flex}
  #builder h3{font-size:16px;color:var(--text-soft);font-weight:700}
  #wordBox{min-height:52px;font-size:38px;font-weight:800;color:var(--ink);letter-spacing:4px;
    display:flex;align-items:center;justify-content:center}
  #wordBox.empty{color:var(--guide-dark);font-size:17px;font-weight:600;letter-spacing:0}
  #chips{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
  .chip{border:none;background:var(--bg);border-radius:999px;padding:6px 13px;font-family:inherit;
    font-size:14px;font-weight:700;color:var(--text);cursor:pointer}
  #alphaGrid{display:grid;grid-template-columns:repeat(9,1fr);gap:5px;width:100%;max-width:400px}
  #alphaGrid button{border:none;background:var(--bg);border-radius:10px;aspect-ratio:1;
    font-family:inherit;font-size:17px;font-weight:800;color:var(--text);cursor:pointer}
  #alphaGrid button:active{transform:scale(.9)}
  #builderCtl{display:flex;gap:10px;align-items:center}
  #goBtn{border:none;border-radius:999px;background:var(--honey);color:#fff;font-family:inherit;
    font-size:17px;font-weight:800;padding:11px 26px;cursor:pointer;box-shadow:0 5px 14px rgba(232,162,94,.4)}
  #goBtn:disabled{opacity:.4;box-shadow:none}
  .ctlBtn{border:none;background:var(--bg);border-radius:999px;padding:10px 15px;font-family:inherit;
    font-size:15px;font-weight:700;color:var(--text-soft);cursor:pointer}

  /* picker */
  #pickerWrap{padding:8px 10px calc(12px + env(safe-area-inset-bottom))}
  #picker{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:4px 6px;
    scrollbar-width:none}
  #picker::-webkit-scrollbar{display:none}
  .tile{flex:0 0 auto;width:46px;height:46px;border-radius:14px;border:none;cursor:pointer;
    background:var(--card);box-shadow:0 3px 10px rgba(74,68,60,.10);font-family:inherit;
    font-size:21px;font-weight:800;color:var(--text);display:flex;align-items:center;justify-content:center;
    position:relative;transition:transform .15s ease}
  .tile:active{transform:scale(.92)}
  .tile.current{outline:3px solid var(--honey);color:var(--ink)}
  .tile.done{color:var(--leaf)}
  .tile.done::after{content:'★';position:absolute;top:-7px;right:-5px;font-size:13px;color:var(--gold)}

  /* celebration */
  #overlay{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(239,234,227,.94);z-index:20;text-align:center;padding:22px}
  #overlay.show{display:flex;animation:fadeIn .4s ease}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  #bigLetter{font-size:clamp(70px,15vw,130px);font-weight:800;color:var(--ink);line-height:1.05;
    animation:bloom .8s cubic-bezier(.2,1.6,.4,1);word-break:break-all;max-width:92vw}
  @keyframes bloom{0%{transform:scale(.3) rotate(-8deg);opacity:0}100%{transform:scale(1) rotate(0)}}
  #cheer{font-size:clamp(20px,4vw,28px);font-weight:800;margin:6px 0 2px}
  #subcheer{color:var(--text-soft);font-size:15px;margin-bottom:8px}
  #balloonZone{position:relative;width:min(90vw,460px);height:28vh;min-height:170px;margin-bottom:6px}
  .balloon{position:absolute;bottom:-90px;width:60px;height:76px;
    border-radius:50% 50% 50% 50%/45% 45% 55% 55%;cursor:pointer;
    animation:rise linear forwards;box-shadow:inset -6px -8px 0 rgba(0,0,0,.06)}
  .balloon::after{content:'';position:absolute;left:50%;bottom:-24px;width:2px;height:24px;background:var(--guide-dark)}
  @keyframes rise{from{transform:translateY(0)}to{transform:translateY(calc(-28vh - 140px))}}
  .balloon.popped{animation:pop .25s ease forwards}
  @keyframes pop{to{transform:scale(1.8);opacity:0}}
  #nextBtn{border:none;border-radius:999px;background:var(--honey);color:#fff;font-family:inherit;
    font-size:19px;font-weight:800;padding:15px 32px;cursor:pointer;
    box-shadow:0 6px 18px rgba(232,162,94,.45);animation:pulseBtn 1.4s ease infinite}
  @keyframes pulseBtn{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
  #againBtn{border:none;background:none;color:var(--text-soft);font-family:inherit;font-size:14px;
    margin-top:10px;cursor:pointer;text-decoration:underline}
</style>
</head>
<body>
<header>
  <div class="brand">Letter Garden</div>
  <div style="display:flex;gap:8px;align-items:center">
    <div class="stars"><span class="icon">★</span><span id="starCount">0</span></div>
    <button id="soundBtn" aria-label="Toggle sound">🔊</button>
  </div>
</header>

<div id="tabs">
  <button class="tab on" data-mode="upper">ABC</button>
  <button class="tab" data-mode="lower">abc</button>
  <button class="tab" data-mode="digits">123</button>
  <button class="tab" data-mode="word">Word</button>
</div>

<div id="prompt">Trace the letter A</div>
<div id="hint">Start at the glowing dot</div>

<div id="stage">
  <div id="card"></div>
  <canvas id="cv"></canvas>
  <div id="builder">
    <h3>Build a word, then trace it!</h3>
    <div id="wordBox" class="empty">tap letters below</div>
    <div id="chips"></div>
    <div id="alphaGrid"></div>
    <div id="builderCtl">
      <button class="ctlBtn" id="backBtn">⌫</button>
      <button id="goBtn" disabled>Trace it! ✏️</button>
      <button class="ctlBtn" id="clearBtn">clear</button>
    </div>
  </div>
</div>

<div id="pickerWrap"><div id="picker"></div></div>

<div id="overlay">
  <div id="bigLetter">A</div>
  <div id="cheer">Wonderful!</div>
  <div id="subcheer">Pop the balloons you earned!</div>
  <div id="balloonZone"></div>
  <button id="nextBtn">Next →</button>
  <button id="againBtn">trace it again</button>
</div>

<script>
/* =========================================================
   Letter Garden v2 — A–Z, a–z, 0–9 + word mode
   Single file · offline · iPad-adaptive touch tolerance
   ========================================================= */

/* ---------- geometry helpers (0–100 letter box) ---------- */
const dist=(a,b)=>Math.hypot(a[0]-b[0],a[1]-b[1]);
function L(a,b){ // line, auto-sampled ~every 6 units
  const n=Math.max(3,Math.round(dist(a,b)/6)),p=[];
  for(let i=0;i<=n;i++){const t=i/n;p.push([a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t]);}return p;}
function A(cx,cy,r,a0,a1){ // arc in degrees, screen coords
  const len=Math.abs(a1-a0)/180*Math.PI*r, n=Math.max(6,Math.round(len/6)),p=[];
  for(let i=0;i<=n;i++){const t=i/n,a=(a0+(a1-a0)*t)*Math.PI/180;
    p.push([cx+r*Math.cos(a),cy+r*Math.sin(a)]);}return p;}
function BUMP(cx,cy,r){ // right half-circle top→bottom
  const p=[];const n=Math.max(6,Math.round(Math.PI*r/6));
  for(let i=0;i<=n;i++){const t=i/n;p.push([cx+r*Math.sin(Math.PI*t),cy-r*Math.cos(Math.PI*t)]);}return p;}
function BZ(p0,p1,p2,p3){ // cubic bezier
  const p=[],n=14;
  for(let i=0;i<=n;i++){const t=i/n,u=1-t;
    p.push([u*u*u*p0[0]+3*u*u*t*p1[0]+3*u*t*t*p2[0]+t*t*t*p3[0],
            u*u*u*p0[1]+3*u*u*t*p1[1]+3*u*t*t*p2[1]+t*t*t*p3[1]]);}return p;}
function J(...segs){ // join segments into one stroke
  const out=[...segs[0]];
  for(let i=1;i<segs.length;i++){const s=segs[i];
    out.push(...(dist(out[out.length-1],s[0])<1?s.slice(1):s));}return out;}

/* ---------- glyph data ---------- */
const UPPER={ /* lines at y=10 (top) and y=90 (baseline) */
 A:[L([50,10],[22,90]),L([50,10],[78,90]),L([33,62],[67,62])],
 B:[L([30,10],[30,90]),BUMP(30,30,20),BUMP(30,70,21)],
 C:[A(54,50,38,-52,-308)],
 D:[L([30,10],[30,90]),BUMP(30,50,40)],
 E:[L([32,10],[32,90]),L([32,10],[74,10]),L([32,50],[70,50]),L([32,90],[74,90])],
 F:[L([32,10],[32,90]),L([32,10],[74,10]),L([32,50],[68,50])],
 G:[A(52,50,38,-52,-320),L([58,58],[88,58])],
 H:[L([28,10],[28,90]),L([72,10],[72,90]),L([28,50],[72,50])],
 I:[L([50,10],[50,90]),L([34,10],[66,10]),L([34,90],[66,90])],
 J:[J(L([62,10],[62,66]),A(47,66,15,0,160))],
 K:[L([30,10],[30,90]),L([72,10],[31,52]),L([31,52],[72,90])],
 L:[J(L([32,10],[32,88]),L([32,88],[74,88]))],
 M:[L([25,10],[25,90]),L([25,10],[50,64]),L([50,64],[75,10]),L([75,10],[75,90])],
 N:[L([28,10],[28,90]),L([28,10],[72,90]),L([72,10],[72,90])],
 O:[A(50,50,38,-90,-450)],
 P:[L([30,10],[30,90]),BUMP(30,32,22)],
 Q:[A(50,47,36,-90,-450),L([60,70],[82,92])],
 R:[L([30,10],[30,90]),BUMP(30,31,21),L([30,52],[72,90])],
 S:[J(BZ([68,20],[38,4],[24,34],[46,48]),BZ([46,48],[74,60],[74,88],[36,86]))],
 T:[L([26,10],[74,10]),L([50,10],[50,90])],
 U:[J(L([28,10],[28,62]),A(50,62,22,180,360),L([72,62],[72,10]))],
 V:[J(L([28,10],[50,90]),L([50,90],[72,10]))],
 W:[J(L([20,10],[35,90]),L([35,90],[50,32]),L([50,32],[65,90]),L([65,90],[80,10]))],
 X:[L([28,10],[72,90]),L([72,10],[28,90])],
 Y:[L([28,10],[50,48]),L([72,10],[50,48]),L([50,48],[50,90])],
 Z:[J(L([28,10],[72,10]),L([72,10],[28,90]),L([28,90],[72,90]))],
};
const LOWER={ /* ascender 10 · x-line 40 · baseline 74 · descender ~96 */
 a:[A(44,57,17,-90,-450),L([61,40],[61,74])],
 b:[L([30,10],[30,74]),A(47,57,17,-180,180)],
 c:[A(48,57,17,-50,-310)],
 d:[A(45,57,17,-40,-320),L([62,10],[62,74])],
 e:[J(L([31,57],[64,57]),A(47.5,57,16.5,0,-300))],
 f:[J(BZ([60,18],[46,8],[38,18],[38,32]),L([38,32],[38,74])),L([26,42],[54,42])],
 g:[A(45,57,16,-40,-320),J(L([61,40],[61,82]),A(47,82,14,0,150))],
 h:[L([30,10],[30,74]),J(A(44,56,14,-180,0),L([58,56],[58,74]))],
 i:[L([50,40],[50,74]),L([50,26],[50,29])],
 j:[J(L([54,40],[54,82]),A(41,82,13,0,150)),L([54,26],[54,29])],
 k:[L([30,10],[30,74]),L([58,40],[31,58]),L([31,58],[58,74])],
 l:[L([50,10],[50,74])],
 m:[L([28,40],[28,74]),J(A(40,54,12,-180,0),L([52,54],[52,74])),J(A(64,54,12,-180,0),L([76,54],[76,74]))],
 n:[L([32,40],[32,74]),J(A(46,56,14,-180,0),L([60,56],[60,74]))],
 o:[A(48,57,17,-90,-450)],
 p:[L([32,40],[32,96]),A(48,57,16,-180,180)],
 q:[A(46,57,16,-40,-320),J(L([62,40],[62,94]),L([62,94],[70,88]))],
 r:[L([34,40],[34,74]),A(47,55,13,-180,-40)],
 s:[J(BZ([60,45],[42,36],[30,48],[45,56]),BZ([45,56],[62,63],[56,76],[36,71]))],
 t:[J(L([46,14],[46,64]),BZ([46,64],[46,72],[52,74],[58,70])),L([32,40],[62,40])],
 u:[J(L([32,40],[32,60]),A(46,60,14,180,360)),L([60,40],[60,74])],
 v:[J(L([34,40],[48,74]),L([48,74],[62,40]))],
 w:[J(L([26,40],[36,74]),L([36,74],[46,52]),L([46,52],[56,74]),L([56,74],[66,40]))],
 x:[L([32,40],[64,74]),L([64,40],[32,74])],
 y:[L([32,40],[47,70]),L([64,40],[36,94])],
 z:[J(L([32,40],[62,40]),L([62,40],[32,74]),L([32,74],[62,74]))],
};
const DIGITS={ /* lines at y=12 and y=88 */
 '0':[A(50,50,32,-90,-450)],
 '1':[J(L([38,26],[52,12]),L([52,12],[52,88]))],
 '2':[J(BZ([32,28],[36,8],[66,10],[64,34]),L([64,34],[28,84]),L([28,84],[72,84]))],
 '3':[J(BZ([34,20],[64,6],[70,36],[48,46]),BZ([48,46],[74,52],[66,86],[32,78]))],
 '4':[J(L([56,12],[26,56]),L([26,56],[72,56])),L([56,16],[56,88])],
 '5':[L([64,14],[36,14]),J(L([36,14],[34,42]),BZ([34,42],[62,36],[70,54],[66,68]),BZ([66,68],[62,84],[38,88],[28,76]))],
 '6':[J(BZ([60,14],[40,24],[32,46],[33,66]),A(50,66,17,-180,180))],
 '7':[J(L([28,14],[70,14]),L([70,14],[42,88]))],
 '8':[A(50,32,16,-90,-450),A(50,66,19,-90,-450)],
 '9':[A(46,33,17,-90,-450),L([63,32],[56,88])],
};
const MODES={
  upper:{glyphs:UPPER, order:Object.keys(UPPER), lines:[10,90], noun:'letter'},
  lower:{glyphs:LOWER, order:Object.keys(LOWER), lines:[10,40,74], noun:'letter'},
  digits:{glyphs:DIGITS, order:Object.keys(DIGITS), lines:[12,88], noun:'number'},
};
const WORD_CHIPS=['cat','dog','sun','hat','mum','dad','big','red'];
const CHEERS=['Wonderful!','You did it!','Amazing tracing!','Super work!','Fantastic!','Brilliant!'];

/* ---------- state ---------- */
let mode='upper';
let current=0;                 // index into current mode order
let glyphStrokes=UPPER.A;      // strokes of the glyph being traced
let glyphChar='A';
let strokeIdx=0, cpIdx=0, tracing=false;
let missStreak=0, assist=0, fireT=0;
let stars=0, soundOn=true, celebrating=false;
const done={upper:new Set(),lower:new Set(),digits:new Set()};
let word='', wordQueue=[], wordPos=-1;   // word mode

/* ---------- canvas ---------- */
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
let W=0,H=0,DPR=1,box={x:0,y:0,s:1};
function resize(){
  const r=cv.getBoundingClientRect();
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=r.width;H=r.height;
  cv.width=W*DPR;cv.height=H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  const m=Math.min(W,H)*0.11, s=Math.min(W,H)-m*2;
  box={x:(W-s)/2,y:(H-s)/2,s:s/100};
}
window.addEventListener('resize',resize);
const LXp=p=>box.x+p[0]*box.s, LYp=p=>box.y+p[1]*box.s;
function toLetter(cx,cy){const r=cv.getBoundingClientRect();
  return [(cx-r.left-box.x)/box.s,(cy-r.top-box.y)/box.s];}

/* ---------- adaptive touch tolerance ----------
   Tolerance is computed in PHYSICAL pixels then converted to letter
   units, so a finger gets the same forgiveness on any screen size.
   Coarse pointers (iPad fingers) get a wider corridor than a mouse,
   and the reported finger contact size widens it further. */
let pointerCoarse = matchMedia('(pointer: coarse)').matches;
let contactPad = 0; // extra letter-units from finger contact size
function tol(){
  const basePx = pointerCoarse ? 26 : 14;      // finger vs mouse, in CSS px
  const units = basePx / Math.max(box.s, 0.001);
  const lo = pointerCoarse ? 7 : 4, hi = pointerCoarse ? 15 : 12;
  return Math.min(hi, Math.max(lo, units)) + contactPad + assist*5;
}
function updateContact(e){
  if(e.pointerType==='touch' && e.width>1){
    contactPad = Math.min(4, (e.width*0.25)/Math.max(box.s,0.001));
  }
}

/* ---------- audio ---------- */
let AC=null;
function audio(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if(AC&&AC.state==='suspended')AC.resume();return AC;}
function tone(f,d=0.12,w=0,v=0.15,t='sine'){
  const ac=audio();if(!ac||!soundOn)return;
  const o=ac.createOscillator(),g=ac.createGain();
  o.type=t;o.frequency.value=f;
  g.gain.setValueAtTime(0.0001,ac.currentTime+w);
  g.gain.exponentialRampToValueAtTime(v,ac.currentTime+w+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+w+d);
  o.connect(g).connect(ac.destination);
  o.start(ac.currentTime+w);o.stop(ac.currentTime+w+d+0.05);}
const chimeCheckpoint=()=>tone(660,0.08,0,0.06);
const chimeStroke=()=>{tone(523,0.1);tone(659,0.12,0.09);};
const chimeLetter=()=>[523,659,784,1047].forEach((f,i)=>tone(f,0.16,i*0.11,0.16));
const chimePop=()=>tone(880,0.07,0,0.2,'triangle');
function say(t){if(!soundOn||!('speechSynthesis' in window))return;
  try{const u=new SpeechSynthesisUtterance(t);u.rate=0.9;u.pitch=1.2;
  speechSynthesis.cancel();speechSynthesis.speak(u);}catch(e){}}
const buzz=ms=>{if(navigator.vibrate)navigator.vibrate(ms);};

/* ---------- particles ---------- */
const sparks=[],confetti=[];
function spawnSparks(x,y,n=3,gold=false){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=0.3+Math.random()*1.2;
    sparks.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-0.4,life:1,r:1.5+Math.random()*2.5,gold});}}
function spawnConfetti(big=true){
  const cols=['#E98B7A','#7FA8C9','#E9B44C','#8FAF87','#3E6B89'];
  const n=big?90:35;
  for(let i=0;i<n;i++){confetti.push({x:W/2+(Math.random()-0.5)*W*0.4,y:H*0.35,
    vx:(Math.random()-0.5)*6,vy:-3-Math.random()*5,c:cols[i%cols.length],
    w:5+Math.random()*6,h:3+Math.random()*4,rot:Math.random()*6,vr:(Math.random()-0.5)*0.3,life:1});}}

/* ---------- drawing ---------- */
const cssCache={};
const getVar=n=>cssCache[n]||(cssCache[n]=getComputedStyle(document.documentElement).getPropertyValue(n).trim());
function drawStrokePath(pts,color,width,upTo=1){
  ctx.strokeStyle=color;ctx.lineWidth=width*box.s;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();const n=Math.max(1,Math.floor((pts.length-1)*upTo));
  ctx.moveTo(LXp(pts[0]),LYp(pts[0]));
  for(let i=1;i<=n;i++)ctx.lineTo(LXp(pts[i]),LYp(pts[i]));ctx.stroke();}
function drawGuidelines(){
  const lines=(mode==='word')?MODES.lower.lines:MODES[mode].lines;
  ctx.strokeStyle=getVar('--guide');ctx.lineWidth=1;ctx.setLineDash([4,6]);
  lines.forEach(y=>{ctx.beginPath();
    ctx.moveTo(box.x-6,LYp([0,y]));ctx.lineTo(box.x+100*box.s+6,LYp([0,y]));ctx.stroke();});
  ctx.setLineDash([]);}
function draw(ts){
  ctx.clearRect(0,0,W,H);
  const inBuilder=document.getElementById('builder').classList.contains('show');
  if(!celebrating && !inBuilder){
    drawGuidelines();
    const ss=glyphStrokes;
    ss.forEach((s,i)=>{if(i>=strokeIdx)drawStrokePath(s,getVar('--guide'),9);});
    for(let i=0;i<strokeIdx;i++)drawStrokePath(ss[i],getVar('--ink'),8);
    if(strokeIdx<ss.length){
      const s=ss[strokeIdx];
      if(cpIdx>0)drawStrokePath(s,getVar('--ink'),8,cpIdx/(s.length-1));
      fireT=(fireT+0.006+assist*0.004)%1;
      const fp=s[Math.floor(fireT*(s.length-1))];
      ctx.globalAlpha=0.5+assist*0.5;ctx.fillStyle=getVar('--honey');
      ctx.beginPath();ctx.arc(LXp(fp),LYp(fp),(3+assist*2)*box.s*0.6+3,0,7);ctx.fill();
      ctx.globalAlpha=1;
      const cp=s[Math.min(cpIdx,s.length-1)],pulse=1+0.25*Math.sin(ts/280);
      ctx.fillStyle=getVar('--honey');
      ctx.beginPath();ctx.arc(LXp(cp),LYp(cp),(6+assist*3)*pulse,0,7);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(LXp(cp),LYp(cp),2.6,0,7);ctx.fill();
    }
  }
  for(let i=sparks.length-1;i>=0;i--){const p=sparks[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.03;p.life-=0.03;
    if(p.life<=0){sparks.splice(i,1);continue;}
    ctx.globalAlpha=p.life;ctx.fillStyle=p.gold?getVar('--gold'):getVar('--ink-soft');
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,7);ctx.fill();ctx.globalAlpha=1;}
  for(let i=confetti.length-1;i>=0;i--){const c=confetti[i];
    c.x+=c.vx;c.y+=c.vy;c.vy+=0.12;c.rot+=c.vr;c.life-=0.006;
    if(c.life<=0||c.y>H+20){confetti.splice(i,1);continue;}
    ctx.save();ctx.translate(c.x,c.y);ctx.rotate(c.rot);
    ctx.globalAlpha=Math.min(1,c.life*2);ctx.fillStyle=c.c;
    ctx.fillRect(-c.w/2,-c.h/2,c.w,c.h);ctx.restore();ctx.globalAlpha=1;}
  requestAnimationFrame(draw);
}

/* ---------- tracing ---------- */
function onDown(e){
  if(celebrating)return;
  audio();updateContact(e);
  const p=toLetter(e.clientX,e.clientY);
  const s=glyphStrokes[strokeIdx];
  if(!s)return;
  if(dist(p,s[Math.min(cpIdx,s.length-1)])<=tol()*1.6){tracing=true;advance(p);}
  else{missStreak++;coach();}
}
function onMove(e){if(!tracing||celebrating)return;updateContact(e);advance(toLetter(e.clientX,e.clientY));}
function onUp(){tracing=false;}
function advance(p){
  const s=glyphStrokes[strokeIdx];if(!s)return;
  let hit=false;
  for(let k=0;k<3&&cpIdx+k<s.length;k++){
    if(dist(p,s[cpIdx+k])<=tol()){
      cpIdx=cpIdx+k+1;hit=true;
      const q=s[Math.min(cpIdx-1,s.length-1)];
      spawnSparks(LXp(q),LYp(q),3);
      if(cpIdx%4===0)chimeCheckpoint();
      buzz(4);missStreak=Math.max(0,missStreak-1);break;}}
  if(!hit&&dist(p,s[Math.min(cpIdx,s.length-1)])>tol()*2.4){missStreak++;coach();}
  if(cpIdx>=s.length)strokeDone();
}
function strokeDone(){
  tracing=false;chimeStroke();buzz([10,30,10]);
  const s=glyphStrokes[strokeIdx],end=s[s.length-1];
  spawnSparks(LXp(end),LYp(end),14,true);
  strokeIdx++;cpIdx=0;fireT=0;
  if(strokeIdx>=glyphStrokes.length)glyphDone();
  else setHint('Stroke '+(strokeIdx+1)+' — start at the glowing dot');
}
function glyphDone(){
  stars++;document.getElementById('starCount').textContent=stars;
  buzz([20,40,20,40,60]);
  if(mode==='word'){
    chimeStroke();spawnConfetti(false);
    wordPos++;
    renderWordPrompt();
    if(wordPos<wordQueue.length){
      setTimeout(()=>startGlyph(wordQueue[wordPos],LOWER[wordQueue[wordPos]]),750);
    }else{
      celebrating=true;chimeLetter();spawnConfetti(true);
      say(pick(CHEERS)+' You traced the word '+word+'!');
      setTimeout(()=>showCelebration(word),900);
    }
    return;
  }
  done[mode].add(glyphChar);
  celebrating=true;chimeLetter();spawnConfetti(true);
  const M=MODES[mode],next=M.order[(current+1)%M.order.length];
  say(pick(CHEERS)+' Can you trace the '+M.noun+' '+spoken(next)+'?');
  setTimeout(()=>showCelebration(glyphChar),900);
  buildPicker();
}
const pick=a=>a[Math.floor(Math.random()*a.length)];
function spoken(ch){
  if(mode==='lower')return 'lowercase '+ch;
  return ch;
}

/* ---------- adaptive coach ---------- */
function coach(){
  assist=Math.min(1,missStreak/8);
  if(missStreak===3)setHint('Follow the glowing dot ✨');
  if(missStreak===6){setHint('Watch the little firefly — it shows the way!');say('Follow the firefly!');fireT=0;}
}
const setHint=t=>document.getElementById('hint').textContent=t;
const setPrompt=t=>document.getElementById('prompt').textContent=t;

/* ---------- glyph / mode control ---------- */
function startGlyph(ch,strokes){
  glyphChar=ch;glyphStrokes=strokes;
  strokeIdx=0;cpIdx=0;missStreak=0;assist=0;fireT=0;tracing=false;
  if(mode==='word'){renderWordPrompt();setHint('Start at the glowing dot');}
  else{
    const M=MODES[mode];
    setPrompt('Trace the '+M.noun+' '+ch);
    setHint('Start at the glowing dot');
    say('Trace the '+M.noun+' '+spoken(ch));
  }
}
function selectIndex(i){
  const M=MODES[mode];current=i;
  startGlyph(M.order[i],M.glyphs[M.order[i]]);
  buildPicker();
}
function setMode(m){
  mode=m;celebrating=false;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.mode===m));
  const builder=document.getElementById('builder');
  if(m==='word'){
    builder.classList.add('show');
    word='';wordQueue=[];wordPos=-1;renderWordBox();
    setPrompt('Word time!');setHint('Build a word, then trace each letter');
    document.getElementById('picker').innerHTML='';
  }else{
    builder.classList.remove('show');
    current=0;selectIndex(0);
  }
}

/* ---------- picker ---------- */
function buildPicker(){
  const pk=document.getElementById('picker');pk.innerHTML='';
  if(mode==='word')return;
  const M=MODES[mode];
  M.order.forEach((ch,i)=>{
    const b=document.createElement('button');
    b.className='tile'+(i===current?' current':'')+(done[mode].has(ch)?' done':'');
    b.textContent=ch;
    b.onclick=()=>selectIndex(i);
    pk.appendChild(b);
  });
  const cur=pk.children[current];
  if(cur)cur.scrollIntoView({inline:'center',block:'nearest'});
}

/* ---------- word mode ---------- */
function renderWordBox(){
  const wb=document.getElementById('wordBox');
  if(word){wb.textContent=word;wb.classList.remove('empty');}
  else{wb.textContent='tap letters below';wb.classList.add('empty');}
  document.getElementById('goBtn').disabled=!word;
}
function renderWordPrompt(){
  const pr=document.getElementById('prompt');pr.innerHTML='';
  wordQueue.forEach((ch,i)=>{
    const s=document.createElement('span');
    s.className='wchar'+(i<wordPos?' doneChar':i===wordPos?' nowChar':'');
    s.textContent=ch;pr.appendChild(s);
  });
}
function startWord(){
  wordQueue=word.split('');wordPos=0;
  document.getElementById('builder').classList.remove('show');
  say('Trace the word '+word+'!');
  startGlyph(wordQueue[0],LOWER[wordQueue[0]]);
}
function buildAlphaGrid(){
  const g=document.getElementById('alphaGrid');
  'abcdefghijklmnopqrstuvwxyz'.split('').forEach(ch=>{
    const b=document.createElement('button');b.textContent=ch;
    b.onclick=()=>{if(word.length<8){word+=ch;renderWordBox();tone(500+word.length*40,0.06,0,0.08);}};
    g.appendChild(b);
  });
  const chips=document.getElementById('chips');
  WORD_CHIPS.forEach(w=>{
    const c=document.createElement('button');c.className='chip';c.textContent=w;
    c.onclick=()=>{word=w;renderWordBox();};
    chips.appendChild(c);
  });
  document.getElementById('backBtn').onclick=()=>{word=word.slice(0,-1);renderWordBox();};
  document.getElementById('clearBtn').onclick=()=>{word='';renderWordBox();};
  document.getElementById('goBtn').onclick=startWord;
}

/* ---------- celebration ---------- */
const overlay=document.getElementById('overlay');
function showCelebration(display){
  document.getElementById('bigLetter').textContent=display;
  document.getElementById('cheer').textContent=pick(CHEERS);
  const zone=document.getElementById('balloonZone');zone.innerHTML='';
  const cols=['var(--pop1)','var(--pop2)','var(--pop3)','var(--pop4)'];
  for(let i=0;i<4;i++){
    const b=document.createElement('div');b.className='balloon';
    b.style.background=cols[i];b.style.left=(8+i*24)+'%';
    b.style.animationDuration=(5+Math.random()*3)+'s';
    b.style.animationDelay=(i*0.5)+'s';
    b.addEventListener('pointerdown',()=>{if(!b.classList.contains('popped')){
      b.classList.add('popped');chimePop();buzz(15);}});
    zone.appendChild(b);
  }
  const nb=document.getElementById('nextBtn'),ab=document.getElementById('againBtn');
  if(mode==='word'){
    nb.textContent='Trace another word →';
    nb.onclick=()=>{hideCelebration();setMode('word');};
    ab.onclick=()=>{hideCelebration();wordPos=0;renderWordPrompt();startGlyph(wordQueue[0],LOWER[wordQueue[0]]);};
  }else{
    const M=MODES[mode],ni=(current+1)%M.order.length;
    nb.textContent='Trace the '+M.noun+' '+M.order[ni]+' →';
    nb.onclick=()=>{hideCelebration();selectIndex(ni);};
    ab.onclick=()=>{hideCelebration();selectIndex(current);};
  }
  overlay.classList.add('show');
}
function hideCelebration(){overlay.classList.remove('show');celebrating=false;}

/* ---------- sound toggle & wiring ---------- */
document.getElementById('soundBtn').onclick=function(){
  soundOn=!soundOn;this.textContent=soundOn?'🔊':'🔇';
  if(!soundOn&&'speechSynthesis' in window)speechSynthesis.cancel();};
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>setMode(t.dataset.mode));
cv.addEventListener('pointerdown',e=>{cv.setPointerCapture(e.pointerId);onDown(e);});
cv.addEventListener('pointermove',onMove);
cv.addEventListener('pointerup',onUp);
cv.addEventListener('pointercancel',onUp);
document.addEventListener('gesturestart',e=>e.preventDefault()); // stop iPad pinch-zoom mid-trace

resize();
requestAnimationFrame(draw);
buildAlphaGrid();
selectIndex(0);
</script>
</body>
</html>
